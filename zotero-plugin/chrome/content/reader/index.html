<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bilingual Reader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="topbar">
    <div id="topbar-title" title=""></div>
    <div id="topbar-controls">
      <button id="btn-prev">Prev</button>
      <span id="page-indicator">Page 1 / ?</span>
      <button id="btn-next">Next</button>
      <div id="note-type-picker">
        <button id="note-type-trigger" type="button">Select note type...</button>
        <div id="note-type-menu" class="hidden">
          <button type="button" data-note-type="Writing Note - Introduction">Introduction</button>
          <button type="button" data-note-type="Writing Note - Research Gap">Research Gap</button>
          <button type="button" data-note-type="Writing Note - Methods">Methods</button>
          <button type="button" data-note-type="Writing Note - Validation">Validation</button>
          <button type="button" data-note-type="Writing Note - Results">Results</button>
          <button type="button" data-note-type="Writing Note - Discussion">Discussion</button>
          <button type="button" data-note-type="Writing Note - Limitations">Limitations</button>
          <button type="button" data-note-type="Writing Note - Useful Expressions">Useful Expressions</button>
        </div>
      </div>
      <button id="btn-generate-note">Generate Writing Note</button>
      <button id="btn-save-zotero">Save to Zotero Note</button>
    </div>
  </div>

  <div id="main-split">
    <div id="left-panel">
      <div id="pdf-error" class="hidden"></div>
      <div id="pdf-container">
        <img id="pdf-page-image" alt="PDF page" />
        <div id="pdf-fallback-text" class="hidden"></div>
        <div id="text-layer"></div>
        <div id="drag-selection-box" class="hidden"></div>
        <canvas id="highlight-canvas"></canvas>
      </div>
    </div>

    <div id="resizer"></div>

    <div id="right-panel">
      <div id="right-header">
        <span>AI Translation - Current Page</span>
        <span id="right-status"></span>
      </div>
      <div id="blocks-container"></div>
      <div id="marks-section">
        <div id="marks-header">Marks on this page</div>
        <div id="marks-container"></div>
      </div>
    </div>
  </div>

  <div id="mark-toolbar" class="hidden">
    <div id="mark-toolbar-inner">
      <span class="toolbar-label">Mark as:</span>
      <button data-type="Background">Background</button>
      <button data-type="Research Gap">Research Gap</button>
      <button data-type="Method">Method</button>
      <button data-type="Assumption">Assumption</button>
      <button data-type="Validation">Validation</button>
      <button data-type="Result Expression">Result</button>
      <button data-type="Limitation">Limitation</button>
      <button data-type="Discussion">Discussion</button>
      <button data-type="Good Sentence">Good Sentence</button>
      <button id="toolbar-cancel">X</button>
    </div>
    <div id="toolbar-comment-row">
      <input id="toolbar-comment" type="text" placeholder="Optional comment..." />
      <button id="toolbar-save">Save Mark</button>
    </div>
  </div>

  <div id="note-modal" class="hidden">
    <div id="note-modal-inner">
      <div id="note-modal-header">
        <span id="note-modal-title">Writing Note</span>
        <button id="note-modal-close">X</button>
      </div>
      <pre id="note-modal-content"></pre>
      <div id="note-modal-footer">
        <button id="note-modal-save">Save to Zotero Note</button>
      </div>
    </div>
  </div>

  <div id="loading-overlay" class="hidden">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading...</div>
  </div>
  <script src="reader.js"></script>
</body>
</html>
